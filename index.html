<!DOCTYPE html>
<html>
<head>
  <title>CBT Subjects</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>SELECT SUBJECT</h1>

  <h3 id="welcome"></h3>

  <div class="card">

    <button onclick="start('english')">English</button>
    <button onclick="start('math')">Mathematics</button>
    <button onclick="start('biology')">Biology</button>
    <button onclick="start('physics')">Physics</button>
    <button onclick="start('chemistry')">Chemistry</button>
    <button onclick="start('economics')">Economics</button>
    <button onclick="start('government')">Government</button>
    <button onclick="start('commerce')">Commerce</button>
    <button onclick="start('literature')">Literature</button>
    <button onclick="start('agriculture')">Agriculture</button>
    <button onclick="start('civic')">Civic Education</button>

  </div>

</div>

<script>
let name = localStorage.getItem("name");

if (!name) {
  window.location.href = "login.html";
}

document.getElementById("welcome").innerText =
  "Welcome " + name;

function start(subject) {
  localStorage.setItem("subject", subject);
  window.location.href = "quiz.html";
}
</script>

</body>
</html>
