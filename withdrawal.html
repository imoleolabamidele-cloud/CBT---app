<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Withdrawal - GPT Earn</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 380px;
      background: #171a21;
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
      color: #00ff88;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #ff3b3b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

    .balance {
      text-align: center;
      margin-bottom: 10px;
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>WITHDRAW</h1>

  <div class="balance">
    Balance: 🪙 <span id="balance">0</span>
  </div>

  <input type="number" id="amount" placeholder="Enter amount">

  <select id="method">
    <option value="paypal">PayPal</option>
    <option value="bank">Bank Transfer</option>
    <option value="crypto">Crypto</option>
  </select>

  <input type="text" id="account" placeholder="Account details">

  <button onclick="withdraw()">Withdraw</button>

  <div class="msg" id="msg"></div>

</div>

<script type="module">
import {
  auth,
  db,
  onAuthStateChanged,
  doc,
  getDoc,
  updateDoc,
  increment
} from "./firebase.js";

let userRef;
let userData;

// GET USER
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  userRef = doc(db, "users", user.uid);

  const snap = await getDoc(userRef);
  userData = snap.data();

  document.getElementById("balance").innerText = userData.coins || 0;
});

// WITHDRAW FUNCTION
window.withdraw = async function () {

  const amount = Number(document.getElementById("amount").value);
  const method = document.getElementById("method").value;
  const account = document.getElementById("account").value;
  const msg = document.getElementById("msg");

  if (!amount || amount <= 0) {
    msg.innerText = "Enter valid amount";
    return;
  }

  if (!account) {
    msg.innerText = "Enter account details";
    return;
  }

  if (amount > userData.coins) {
    msg.innerText = "Insufficient balance";
    return;
  }

  try {

    // Deduct coins
    await updateDoc(userRef, {
      coins: increment(-amount)
    });

    msg.innerText = "Withdrawal request sent successfully!";
    document.getElementById("balance").innerText =
      userData.coins - amount;

  } catch (error) {
    msg.innerText = error.message;
  }
};
</script>

</body>
</html>
