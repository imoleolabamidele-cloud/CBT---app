<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h1 id="title">📖 LESSON</h1>

    <div id="content" style="text-align:left; margin-top:15px; line-height:1.7;"></div>

    <button class="btn" onclick="startQuiz()">
      🚀 START QUIZ
    </button>

  </div>

</div>

<!-- 📘 YOUR DATABASE -->
<script src="data.js"></script>

<script>

// 🔐 CHECK USER LOGIN
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

// 📚 GET SUBJECT + TOPIC
const subject = localStorage.getItem("currentSubject");
const topic = localStorage.getItem("currentTopic");

if (!subject || !topic) {
    window.location.href = "subjects.html";
}

// 🏷️ TITLE
document.getElementById("title").innerText =
    subject.toUpperCase() + " - " + topic;

// 📖 GET LESSON FROM DATA.JS
const contentBox = document.getElementById("content");

if (data && data[subject] && data[subject][topic]) {

    contentBox.innerHTML = `
        <div style="white-space:pre-line; font-weight:800;">
            ${data[subject][topic]}
        </div>
    `;

} else {

    contentBox.innerHTML = `
        <p>No lesson available for this topic yet.</p>
    `;

}

// 🚀 GO TO QUIZ
function startQuiz() {
    window.location.href = "quiz.html";
}

</script>

</body>
</html>
