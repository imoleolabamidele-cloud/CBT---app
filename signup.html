<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f1115;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 380px;
      background: #171a21;
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
      color: #00ff88;
      font-weight: 900;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .msg {
      text-align: center;
      font-size: 13px;
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>SIGN UP</h1>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="text" id="referral" placeholder="Referral Code (optional)">

  <button onclick="signup()">Create Account</button>

  <div class="msg" id="msg"></div>

</div>

<script type="module">

import {
  auth,
  db,
  createUserWithEmailAndPassword,
  doc,
  setDoc,
  getDocs,
  collection,
  updateDoc,
  increment
} from "./firebase.js";

const urlParams = new URLSearchParams(window.location.search);
const autoRef = urlParams.get("ref");

if (autoRef) {
  document.getElementById("referral").value = autoRef;
}

window.signup = async function () {const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const referralInput = document.getElementById("referral").value.trim();
  const msg = document.getElementById("msg");

  if (!name || !email || !password) {
    msg.innerText = "Please fill all fields";
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(auth, email, password);

    const user = userCredential.user;

    const refCode = user.uid.substring(0, 6).toUpperCase();

    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      coins: 0,
      streak: 0,
      referrals: 0,
      totalEarned: 0,
      completedSurveys: [],
      refCode: refCode,
      referredBy: null,
      createdAt: Date.now()
    });

    if (referralInput !== "") {

      const users = await getDocs(collection(db, "users"));

      for (const docSnap of users.docs) {

        const data = docSnap.data();

        if (
          data.refCode === referralInput &&
          docSnap.id !== user.uid
        ) {await updateDoc(doc(db, "users", docSnap.id), {
            coins: increment(20),
            referrals: increment(1),
            totalEarned: increment(20)
          });

          await updateDoc(doc(db, "users", user.uid), {
            coins: increment(10),
            referredBy: referralInput,
            totalEarned: increment(10)
          });

          msg.innerText = "Account created successfully!";
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1200);

          return;
        }
      }
    }

    msg.innerText = "Account created successfully!";
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1200);

  } catch (error) {
    msg.innerText = error.message;
  }
};</script>

</body>
</html>
